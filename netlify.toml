# Netlify configuration for Nordic Global Solutions presentations
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "nordic-global-solutions-hiring/dist"
  command = "cd nordic-global-solutions-hiring && npm install && npm run build"

# Redirect old /preview to /join-us
[[redirects]]
  from = "/preview"
  to = "/join-us"
  status = 301

# Security and cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure OG images are cacheable and have correct type for social crawlers
[[headers]]
  for = "/og-index.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "image/jpeg"

[[headers]]
  for = "/og-join-us.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "image/jpeg"

[[headers]]
  for = "/og-slides.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "image/jpeg"

# PDF downloads
[[headers]]
  for = "/AI_Dev_Suite.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/pdf"

[[headers]]
  for = "/Mimir_Intelligent_Nexus.pdf"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/pdf"
