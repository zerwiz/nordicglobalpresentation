# Netlify configuration for Nordic Global Solutions presentations
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "nordic-global-solutions-hiring/dist"
  command = "cd nordic-global-solutions-hiring && npm install && npm run build"

# Security and cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Ensure og-image is cacheable and has correct type for social crawlers
[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "image/png"
