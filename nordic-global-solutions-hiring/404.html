<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>404 — Page Not Found | Nordic Global Solutions</title>
  <meta name="description" content="Page not found. Return to Nordic Global Solutions landing page or presentation.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#030306">
  <meta name="application-name" content="Nordic Global Solutions">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-TileColor" content="#030306">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <!-- Open Graph (minimal for 404) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="404 — Page Not Found | Nordic Global Solutions">
  <meta property="og:description" content="Page not found. Return to Nordic Global Solutions.">
  <meta property="og:url" content="https://www.nordicglobalsolutions.com/404.html">
  <meta property="og:site_name" content="Nordic Global Solutions">
  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="404 — Nordic Global Solutions">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030306;
      --border: rgba(255,255,255,0.06);
      --gold: #d4af37;
      --gold-soft: #e8c96a;
      --text: #f4f4f6;
      --text-muted: #a1a1aa;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.06) 0%, transparent 50%),
        linear-gradient(180deg, #030306 0%, #0a0a12 100%);
      pointer-events: none;
      z-index: 0;
    }
    .content { position: relative; z-index: 1; }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 600; margin: 0 0 0.5rem; color: var(--text); }
    p { color: var(--text-muted); margin: 0 0 1.5rem; }
    a {
      color: var(--gold-soft);
      text-decoration: none;
      border-bottom: 1px solid rgba(212,175,55,0.5);
      padding-bottom: 2px;
      font-weight: 500;
    }
    a:hover { color: var(--gold); }

    .links { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    @media (max-width: 768px) {
      body { padding: 1.5rem; }
      h1 { font-size: 1.5rem; }
      .links { flex-direction: column; align-items: center; }
      .links a { padding: 0.5rem 0; min-height: 44px; display: inline-flex; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>404 — Page Not Found</h1>
    <p>This page doesn't exist. Return to the landing page or presentation.</p>
    <div class="links">
      <a href="index.html">Go to landing page</a>
      <a href="slides.html">View presentation</a>
    </div>
  </div>
</body>
</html>
